<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Neon Task Board</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00f5ff">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="bg-glow"></div>

  <header class="fade-in">
    <h1>⚡ dash board</h1>
    <p>Fluxo de tarefas inteligente</p>
  </header>

  <section class="input-area slide-up">
    <input id="taskInput" placeholder="Nova tarefa..." />
    
    <section class="ai-bar">
  <button onclick="autoOrganize()">🤖 Auto-organizar IA</button>
</section>
    
    <button onclick="addTask()">+</button>
  </section>

  <main class="board">

    <div class="column glass">
      <h2>📌 A Fazer</h2>
      <div id="todo" class="list"></div>
    </div>

    <div class="column glass">
      <h2>⚙️ Em Progresso</h2>
      <div id="doing" class="list"></div>
    </div>

    <div class="column glass">
      <h2>✅ Concluído</h2>
      <div id="done" class="list"></div>
    </div>

  </main>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>

</body>
</html>
