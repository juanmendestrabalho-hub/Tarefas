<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TESTE DE DASH</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00f5ff">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="bg-glow"></div>

  <header class="fade-in">
    <h1>⚡ Dash Board XP</h1>
    <p>Produtividade gamificada + IA</p>
  </header>

  <!-- XP DASHBOARD -->
  <section class="xp-dashboard">

    <div class="xp-card">
      <h3>⭐ Nível</h3>
      <p id="level">1</p>
    </div>

    <div class="xp-card">
      <h3>🔥 XP</h3>
      <p id="xp">0</p>
    </div>

    <div class="xp-card">
      <h3>🏆 Streak</h3>
      <p id="streak">0</p>
    </div>

  </section>

  <!-- PROGRESS BAR -->
  <div class="xp-bar">
    <div id="progress"></div>
  </div>

  <!-- INPUT -->
  <section class="input-area slide-up">

    <input id="taskInput" placeholder="Nova tarefa..." />

    <button onclick="addTask()">+</button>

  </section>

  <!-- IA -->
  <section class="ai-bar">
    <button onclick="autoOrganize()">🤖 Auto-organizar IA</button>
  </section>

  <!-- BOARD -->
  <main class="board">

    <div class="column glass">
      <h2>📌 A Fazer</h2>
      <div id="todo" class="list"></div>
    </div>

    <div class="column glass">
      <h2>⚙️ Em Progresso</h2>
      <div id="doing" class="list"></div>
    </div>

    <div class="column glass">
      <h2>✅ Concluído</h2>
      <div id="done" class="list"></div>
    </div>

  </main>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>

</body>

  
</html>
